<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRMSS - Smart Depot Management</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="login-screen" class="login-container">
        <div style="background:var(--card-bg); padding:40px; border-radius:10px; width:100%; max-width:320px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="text-align:center; color:var(--primary); margin-bottom:20px;">SRMSS Login</h2>
            <input type="text" id="login_user" placeholder="Username" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid var(--input-border); border-radius:5px; box-sizing:border-box;">
            <input type="password" id="login_pass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid var(--input-border); border-radius:5px; box-sizing:border-box;">
            <button onclick="app.login()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:5px; cursor:pointer; font-weight:600;">Sign In</button>
        </div>
    </div>
    <div id="app-container" class="app-container hidden">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>SRMSS</h2>
                <button class="theme-switch" onclick="app.toggleTheme()" title="Toggle Theme">🌙</button>
            </div>
            <div style="padding: 10px 20px; font-size: 12px; opacity: 0.7; border-bottom: 1px solid rgba(255,255,255,0.1);">
                Role: <span id="user-role-display">Role</span>
            </div>
            <ul id="nav-menu">
                <li onclick="app.loadPage('dashboard')" id="nav-dashboard">Dashboard</li>
                <li onclick="app.loadPage('vehicles')" id="nav-vehicles" style="display:none;">Vehicles</li>
                <li onclick="app.loadPage('drivers')" id="nav-drivers" style="display:none;">Drivers</li>
                <li onclick="app.loadPage('fuel')" id="nav-fuel" style="display:none;">Fuel Logs</li>
                <li onclick="app.loadPage('reports')" id="nav-reports" style="display:none;">Reports</li>
            </ul>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="app.logout()">Logout</button>
            </div>
        </nav>
        <main class="main-content">
            <header>
                <h1 id="page-title">Dashboard</h1>
                <div id="header-actions"></div>
            </header>
            <div id="content-area">Loading...</div>
        </main>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
